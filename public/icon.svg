<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with iOS-style gradient -->
  <rect width="512" height="512" rx="115" fill="url(#gradient)"/>
  
  <!-- Bridge arch design with modern minimalist style -->
  <g opacity="0.95">
    <!-- Bridge arch -->
    <path d="M 120 380 Q 256 200 392 380" stroke="white" stroke-width="32" fill="none" stroke-linecap="round"/>
    
    <!-- Bridge pillars -->
    <rect x="110" y="350" width="20" height="80" fill="white" rx="4"/>
    <rect x="382" y="350" width="20" height="80" fill="white" rx="4"/>
    
    <!-- Connection lines representing outreach -->
    <circle cx="256" cy="280" r="12" fill="white"/>
    <line x1="256" y1="280" x2="180" y2="220" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="280" x2="332" y2="220" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="280" x2="256" y2="180" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Connection nodes -->
    <circle cx="180" cy="220" r="8" fill="white"/>
    <circle cx="332" cy="220" r="8" fill="white"/>
    <circle cx="256" cy="180" r="8" fill="white"/>
  </g>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5AC8FA;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
